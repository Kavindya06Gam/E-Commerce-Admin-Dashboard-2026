# render.yaml — Render.com Infrastructure-as-Code
# This file tells Render how to build and deploy your application
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ecommerce-admin-dashboard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-admin-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-admin-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ecommerce-admin-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ecommerce-admin-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-admin-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_PASSWORD
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: ecommerce-admin-db
    plan: free
    databaseName: ecommerce_admin
    user: ecommerce_user
